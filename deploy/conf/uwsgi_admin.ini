[uwsgi]
chdir=/app
http=:8000
module=portal_api.wsgi:application
vacuum=true
limit-post=11000000
master=1
processes=2
threads=2
pidfile=/tmp/project-master.pid
max-requests=5000
log-x-forwarded-for=true
log-format = remote_addr="%(addr)" - date="%(ltime)" method="%(method) url="%(uri)" http_version="%(proto)" status=%(status) res_length=%(size) referer="%(referer)" user_agent="%(uagent)" response_time="%(msecs) millisec"
static-map = /static=/app/static
buffer-size=32768
