apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "portal-catv-chart.fullname" . }}-deployment
  labels:
    {{- include "portal-catv-chart.labels" . | nindent 4 }}
spec:
  {{- if not .Values.autoscaling.enabled }}
  replicas: {{ .Values.replicaCount }}
  {{- end }}
  selector:
    matchLabels:
      {{- include "portal-catv-chart.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      {{- with .Values.podAnnotations }}
      annotations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      labels:
        {{- include "portal-catv-chart.selectorLabels" . | nindent 8 }}
    spec:
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      serviceAccountName: {{ include "portal-catv-chart.serviceAccountName" . }}
      securityContext:
        {{- toYaml .Values.podSecurityContext | nindent 8 }}
      containers:
        - name: {{ .Values.main.containerName }}
          securityContext:
          {{- toYaml .Values.main.securityContext | nindent 12 }}
          image: "{{ .Values.main.image.repository }}:{{ .Values.main.image.tag }}"
          imagePullPolicy: {{ .Values.main.pullPolicy }}
          env:
            {{- if .Values.main.envVars }}
            {{- .Values.main.envVars | toYaml | nindent 12 }}
            {{- end }}   
          envFrom:
            {{- if .Values.main.envVarsCM }}
            - configMapRef:
                name: {{ .Values.main.envVarsCM }}
            {{- end }}
            {{- if .Values.main.envVarsSecret }}
            - secretRef:
                name: {{ .Values.main.envVarsSecret }}
            {{- end }}
          ports:
            - containerPort: {{ .Values.main.containerPort }}
              protocol: TCP
          livenessProbe:
          {{- if .Values.main.livenessProbe }}
          {{- toYaml .Values.main.livenessProbe | nindent 12 }}
          {{- end }}
          readinessProbe:
          {{- if .Values.main.readinessProbe }}
          {{- toYaml .Values.main.readinessProbe | nindent 12 }}
          {{- end }}
          resources:
            {{- toYaml .Values.main.resources | nindent 12 }}
          volumeMounts:
          {{- with .Values.main.volumeMounts }}
            {{- toYaml .Values.main.volumeMounts | nindent 12 }}
          {{- end }}
      {{- if .Values.sidecar.enabled }}
        - name: {{ .Values.sidecar.containerName }}
          image:  "{{ .Values.sidecar.image.repository }}:{{ .Values.sidecar.image.tag }}"
          args: {{- toYaml .Values.sidecar.args | nindent 12 }}
          env:
          - name: KUBERNETES_CLUSTER_DOMAIN
            value: {{ quote .Values.kubernetesClusterDomain }}
          imagePullPolicy: {{ .Values.sidecar.pullPolicy }}
          securityContext: 
          {{- toYaml .Values.sidecar.securityContext | nindent 12 }}
      {{- end }}

      volumes:
      {{- with .Values.volumes }}
        {{- toYaml .Values.volumes | nindent 8 }}
      {{- end }}
      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
